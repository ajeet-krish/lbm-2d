<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LBM-2D Real-Time Simulator - Interactive WebAssembly CFD with D2Q9 BGK">
  <title>Real-Time Simulator - LBM-2D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Sidebar toggle button inside simulator */
    .sidebar-toggle {
      position: fixed; top: 12px; left: 12px; z-index: 100;
      background: var(--bg-card); color: var(--fg-dim);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 6px 10px; font-size: 0.8em; cursor: pointer;
      transition: all 0.15s;
    }
    .sidebar-toggle:hover { border-color: var(--cyan-dim); color: var(--fg); }

    /* When sidebar is open, push canvas */
    .sim-container { transition: margin-left 0.2s; }

    html, body {
      height: 100%; margin: 0; overflow: hidden;
      background: var(--bg-primary);
      font-family: 'JetBrains Mono', monospace;
      color: var(--fg);
    }
    .sim-container {
      display: flex; height: 100vh; width: 100vw;
    }
    .canvas-area {
      flex: 1; position: relative; overflow: hidden;
      background: var(--bg-canvas);
      display: flex; align-items: center; justify-content: center;
    }
    .canvas-area canvas {
      width: 100%; height: 100%; display: block;
      image-rendering: pixelated;
    }
    .hud-overlay {
      position: absolute; top: 12px; left: 12px;
      font-size: 0.72em; line-height: 1.6;
      color: var(--cyan); pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }
    .hud-overlay span { display: block; }
    .hud-watermark {
      position: absolute; bottom: 12px; right: 16px;
      font-size: 0.6em; color: var(--fg-muted); opacity: 0.4;
      pointer-events: none;
    }
    .controls-panel {
      width: 280px; min-width: 280px;
      background: var(--bg-card); border-left: 1px solid var(--border);
      padding: 16px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 16px;
    }
    .controls-panel::-webkit-scrollbar { width: 4px; }
    .controls-panel::-webkit-scrollbar-track { background: transparent; }
    .controls-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .panel-title {
      font-size: 0.78em; font-weight: 700; color: var(--cyan);
      letter-spacing: 0.5px; text-transform: uppercase;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .control-group {
      display: flex; flex-direction: column; gap: 6px;
    }
    .control-group label {
      font-size: 0.68em; color: var(--fg-dim); text-transform: uppercase; letter-spacing: 0.3px;
    }
    .control-group .value-display {
      font-size: 0.78em; color: var(--fg); font-weight: 500;
    }
    .shape-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
    }
    .shape-btn {
      padding: 6px 4px; font-size: 0.62em; font-family: inherit;
      background: var(--bg-primary); color: var(--fg-dim);
      border: 1px solid var(--border); border-radius: 4px;
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .shape-btn:hover { border-color: var(--cyan-dim); color: var(--fg); }
    .shape-btn.active {
      background: var(--cyan-dim); color: #000; border-color: var(--cyan);
      font-weight: 700;
    }
    input[type="range"] {
      width: 100%; height: 4px; -webkit-appearance: none;
      background: var(--border); border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      background: var(--cyan); border-radius: 50%; cursor: pointer;
      border: 2px solid var(--bg-primary);
    }
    .airfoil-controls {
      display: none; flex-direction: column; gap: 8px;
    }
    .airfoil-controls.visible { display: flex; }
    .playback-row {
      display: flex; gap: 6px;
    }
    .playback-btn {
      flex: 1; padding: 8px; font-size: 0.68em; font-family: inherit;
      background: var(--bg-primary); color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px;
      cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .playback-btn:hover { border-color: var(--cyan-dim); }
    .playback-btn.primary { background: var(--cyan-dim); color: #000; border-color: var(--cyan); font-weight: 700; }
    .playback-btn.primary:hover { background: var(--cyan); }
    .loading-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg-primary);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      transition: opacity 0.5s;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border); border-top-color: var(--cyan);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 0.78em; color: var(--fg-dim); }
    .status-indicator {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.62em; color: var(--fg-dim);
    }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); animation: pulse 1.5s infinite;
    }
    .status-dot.paused { background: var(--orange); animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    @media (max-width: 700px) {
      .sim-container { flex-direction: column; }
      .controls-panel {
        width: 100%; min-width: unset; max-height: 40vh;
        border-left: none; border-top: 1px solid var(--border);
      }
      .canvas-area { height: 60vh; }
      .shape-grid { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading WASM solver...</div>
</div>

<button class="sidebar-toggle" id="sidebarToggle">&#9776;</button>

<div class="sidebar" id="sidebar">
  <div class="sidebar-brand"><a href="index.html">LBM-2D</a></div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-heading">Project</div>
      <a href="index.html" class="nav-item">Home</a>
      <a href="simulation.html" class="nav-item active">Simulation Dashboard</a>
      <a href="results.html" class="nav-item">Validation &amp; Results</a>
    </div>
    <div class="nav-section">
      <div class="nav-heading">Reference</div>
      <a href="theory.html" class="nav-item">Theory &amp; Methodology</a>
      <a href="implementation.html" class="nav-item">Implementation</a>
      <a href="https://github.com/ajeet-krish/lbm-2d" class="nav-item" target="_blank">GitHub Repository &nearr;</a>
    </div>
  </nav>
</div>

<div class="sim-container">
  <div class="canvas-area">
    <canvas id="simCanvas"></canvas>
    <div class="hud-overlay" id="hudOverlay">
      <span id="hudCd">Cd: 0.0000</span>
      <span id="hudCl">Cl: 0.0000</span>
      <span id="hudSteps">Steps: 0</span>
    </div>
    <div class="hud-watermark">LBM-2D &middot; D2Q9 BGK</div>
  </div>

  <div class="controls-panel">
    <div class="panel-title">Simulation Controls</div>

    <div class="control-group">
      <label>Shape</label>
      <div class="shape-grid">
        <button class="shape-btn active" data-shape="0" data-params='{"cx":30,"cy":30,"size":12}'>Cylinder</button>
        <button class="shape-btn" data-shape="1" data-params='{"cx":30,"cy":30,"size":12}'>Square</button>
        <button class="shape-btn" data-shape="2" data-params='{"cx":30,"cy":30,"size":12}'>Diamond</button>
        <button class="shape-btn" data-shape="3" data-params='{"cx":30,"cy":30,"size":12}'>Star</button>
        <button class="shape-btn" data-shape="4" data-series="12" data-params='{"cx":33,"cy":30,"size":30}'>NACA 0012</button>
        <button class="shape-btn" data-shape="4" data-series="2412" data-params='{"cx":33,"cy":30,"size":30}'>NACA 2412</button>
      </div>
    </div>

    <div class="control-group">
      <label>Reynolds Number</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="reSlider" min="20" max="200" value="100" step="1">
        <span class="value-display" id="reValue">100</span>
      </div>
    </div>

    <div class="airfoil-controls" id="airfoilControls">
      <div class="control-group">
        <label>Angle of Attack</label>
        <div style="display:flex;align-items:center;gap:8px;">
          <input type="range" id="aoaSlider" min="0" max="16" value="4" step="1">
          <span class="value-display" id="aoaValue">4&deg;</span>
        </div>
      </div>
    </div>

    <div class="control-group">
      <label>Simulation Speed</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="speedSlider" min="5" max="30" value="10" step="1">
        <span class="value-display" id="speedValue">1.0x</span>
      </div>
    </div>

    <div class="playback-row">
      <button class="playback-btn primary" id="playBtn">&#9646;&#9646; Pause</button>
      <button class="playback-btn" id="resetBtn">&#8635; Reset</button>
    </div>

    <div style="margin-top: auto; display: flex; align-items: center; justify-content: space-between;">
      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Loading...</span>
      </div>
      <span style="font-size:0.55em;color:var(--fg-muted);">WASM &middot; 100 &times; 60</span>
    </div>
  </div>
</div>

<script>
// Define Module config BEFORE loading the WASM glue script
var Module = {
    locateFile: function(path) {
        if (path.endsWith('.wasm')) return 'assets/wasm/lbm_solver.wasm';
        return path;
    },
    onRuntimeInitialized: function() {
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('statusText').textContent = 'Live';
        // Start the simulation
        if (window.WasmSimReady) {
            window.WasmSimReady();
        }
    },
};
</script>
<script src="assets/js/wasm_sim.js"></script>
<script src="assets/wasm/lbm_solver.js"></script>
<script>
(function() {
    'use strict';

    const canvas = document.getElementById('simCanvas');
    const hudCd = document.getElementById('hudCd');
    const hudCl = document.getElementById('hudCl');
    const hudSteps = document.getElementById('hudSteps');
    const reSlider = document.getElementById('reSlider');
    const reValue = document.getElementById('reValue');
    const aoaSlider = document.getElementById('aoaSlider');
    const aoaValue = document.getElementById('aoaValue');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');
    const airfoilControls = document.getElementById('airfoilControls');
    const statusDot = document.getElementById('statusDot');

    // Current state
    let currentShapeType = 0;
    let currentSeries = 12;
    let currentShapeParams = { cx: 30, cy: 30, size: 12 };
    let sim = null;

    function getRefLen(type, params) {
        if (type === 4) return params.size;
        return params.size * 2;
    }

    function applyShape() {
        if (!sim) return;
        const s = currentShapeType;
        const p = currentShapeParams;
        if (s === 4) {
            sim.setShape(s, p.cx, p.cy, p.size, currentSeries);
        } else {
            sim.setShape(s, p.cx, p.cy, p.size, 0);
        }
        // Re-apply Re
        const re = parseInt(reSlider.value);
        const refLen = getRefLen(s, p);
        sim.setRe(re, refLen);
        if (s === 4) {
            sim.setShape(s, p.cx, p.cy, p.size, currentSeries);
        } else {
            sim.setShape(s, p.cx, p.cy, p.size, 0);
        }
    }

    // Shape buttons
    document.querySelectorAll('.shape-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.shape-btn').forEach(function(b) { b.classList.remove('active'); });
            this.classList.add('active');
            currentShapeType = parseInt(this.dataset.shape);
            currentShapeParams = JSON.parse(this.dataset.params);
            if (this.dataset.series) currentSeries = parseInt(this.dataset.series);
            airfoilControls.classList.toggle('visible', currentShapeType === 4);
            applyShape();
        });
    });

    // Re slider
    reSlider.addEventListener('input', function() {
        if (!sim) return;
        const re = parseInt(this.value);
        reValue.textContent = re;
        const refLen = getRefLen(currentShapeType, currentShapeParams);
        sim.setRe(re, refLen);
        if (currentShapeType === 4) {
            sim.setShape(4, currentShapeParams.cx, currentShapeParams.cy,
                currentShapeParams.size, currentSeries);
        } else {
            sim.setShape(currentShapeType, currentShapeParams.cx,
                currentShapeParams.cy, currentShapeParams.size, 0);
        }
    });

    // AoA slider
    aoaSlider.addEventListener('input', function() {
        if (!sim) return;
        const aoa = parseInt(this.value);
        aoaValue.innerHTML = aoa + '&deg;';
        if (currentShapeType === 4) {
            sim.setAoA(currentSeries, aoa);
        }
    });

    // Speed slider
    speedSlider.addEventListener('input', function() {
        if (!sim) return;
        const speed = parseInt(this.value) / 10.0;
        speedValue.textContent = speed.toFixed(1) + 'x';
        sim.setSpeed(speed);
    });

    // Play/pause
    playBtn.addEventListener('click', function() {
        if (!sim) return;
        sim.togglePlay();
        const running = sim.isRunning();
        playBtn.innerHTML = running ? '&#9646;&#9646; Pause' : '&#9654; Play';
        statusDot.className = running ? 'status-dot' : 'status-dot paused';
    });

    // Reset
    resetBtn.addEventListener('click', function() {
        if (!sim) sim.reset();
    });

    // Called when WASM is ready
    window.WasmSimReady = function() {
        sim = WasmSim.init(canvas, {

            hudCd: hudCd,
            hudCl: hudCl,
            hudSteps: hudSteps,
        });

        statusDot.className = 'status-dot';
        document.getElementById('statusText').textContent = 'Live';

        // Initial setup
        setTimeout(function() {
            if (!sim) return;
            const refLen = getRefLen(currentShapeType, currentShapeParams);
            const re = parseInt(reSlider.value);
            sim.setRe(re, refLen);
            applyShape();
            sim.play();
        }, 100);
    };

    // Sidebar toggle
    document.getElementById('sidebarToggle').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('open');
        document.body.classList.toggle('sidebar-open');
    });
})();
</script>

</body>
</html>
